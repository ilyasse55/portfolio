<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJN DSN | Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #05020a; 
            color: white; 
            font-family: sans-serif; 
            overflow-x: hidden; 
        }
        
        /* 1. شاشة الدخول (GUNS.LOL STYLE ENTER SCREEN) */
        #enter-screen {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background-color: #05020a;
            z-index: 99999 !important; /* ديما الفوق باش يتكليكا */
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out;
        }

        /* 2. الشمس الكبيرة فـ الخلفية */
        .sun-bg {
            position: fixed;
            bottom: -15%; /* شادة المساحة لتحت */
            left: 50%;
            transform: translateX(-50%);
            width: 900px; 
            height: 900px;
            background: linear-gradient(to bottom, #ff007f, #ffcc00);
            border-radius: 50%;
            box-shadow: 0 0 200px #ff007f;
            z-index: -2;
        }

        /* 3. الشبكة المتحركة (Synthwave Grid Floor) */
        .grid-floor {
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: 50%;
            background-image: 
                linear-gradient(to right, #ff00ff 2px, transparent 2px), 
                linear-gradient(to bottom, #ff00ff 2px, transparent 2px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            z-index: -1;
            animation: moveGrid 2s linear infinite;
        }
        
        @keyframes moveGrid { 
            from { background-position: 0 0; } 
            to { background-position: 0 50px; } 
        }

        /* 4. تنسيق حاوية النص والوضوح */
        .text-container { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding-top: 100px; 
        }

        /* التوهج والوضوح للكلمة الزرقاء */
        .neon-glow-cyan { 
            text-shadow: 0 0 5px #00f0ff, 0 0 10px #00f0ff; 
            color: #ffffff; 
            background: rgba(0, 0, 0, 0.6); /* خلفية داكنة باش تبان الكلمة */
            padding: 2px 10px; 
            border: 1px solid rgba(0, 240, 255, 0.5);
            border-radius: 8px;
        }

        /* تنسيق كاسيت الصوت والزر */
        .cassette-container {
            margin-top: 40px;
            background: rgba(10, 5, 20, 0.85);
            border: 2px solid #00f0ff;
            border-radius: 12px;
            padding: 20px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        .audio-btn { 
            width: 100%;
            padding: 12px 24px; 
            background: #00f0ff; 
            color: black;
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .audio-btn:hover {
            background: #ff007f;
            color: white;
            box-shadow: 0 0 15px #ff007f;
        }
    </style>
</head>
<body class="min-h-screen relative pb-24">

    <div id="enter-screen" onclick="initializeVault()">
        <span class="text-xs text-zinc-600 mb-2 tracking-widest font-mono">CORE_SYSTEM_ONLINE v867</span>
        <h2 class="text-xl md:text-2xl font-black text-cyan-400 tracking-widest font-retro select-none animate-pulse">
            [ CLICK TO ENTER THE VAULT ]
        </h2>
    </div>

    <div class="sun-bg"></div>
    <div class="grid-floor"></div>

    <div class="text-container px-4">
        <h1 class="text-4xl md:text-6xl font-black tracking-tight text-white mb-4">
            Do you need <span class="neon-glow-cyan">a thumbnail</span>
        </h1>
        <h2 class="text-3xl md:text-5xl font-black text-white mb-6">
            that boosts your CTR?
        </h2>
        
        <p class="text-zinc-400 max-w-md mx-auto mb-8 text-sm md:text-base">
            We make the best High Tier Thumbnails with a cinematic retro vibe.
        </p>

        <div class="cassette-container">
            <div class="text-left text-xs font-mono text-cyan-400 mb-4 flex justify-between">
                <span>SYSTEM_AUDIO: Venger.mp3</span>
                <span id="tape-status">● READY</span>
            </div>
            
            <button id="playBtn" class="audio-btn" onclick="toggleAudio()">
                <i id="playIcon" class="fas fa-play mr-2"></i> <span id="playText">INSERT TAPE / PLAY</span>
            </button>
            
            <audio id="bgAudio" src="Venger.mp3" loop></audio>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgAudio');
        const playBtn = document.getElementById('playBtn');
        const playText = document.getElementById('playText');
        const playIcon = document.getElementById('playIcon');
        const tapeStatus = document.getElementById('tape-status');

        // دالة الدخول للموقع عند الضغط على الشاشة الأولى
        function initializeVault() {
            console.log("Vault initialization triggered!");
            const screen = document.getElementById('enter-screen');
            
            // إخفاء شاشة الدخول بـ تأثير سلس
            screen.style.opacity = '0';
            
            // تدمير الطبقة تماماً بعد الأنيميشن باش تخلي الأزرار اللي تحتها تتكليكا
            setTimeout(() => {
                screen.style.display = 'none';
            }, 800);

            // تشغيل الأغنية أوتوماتيكياً إذا وافق المتصفح
            audio.play().then(() => {
                tapeStatus.innerText = "● PLAYING";
                playText.innerText = "PAUSE TAPE";
                playIcon.className = "fas fa-pause mr-2";
            }).catch(err => {
                console.log("Auto-play blocked, waiting for user input.");
                tapeStatus.innerText = "● READY";
            });
        }

        // دالة الزر لتشغيل وإيقاف الأغنية يدوياً
        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                tapeStatus.innerText = "● PLAYING";
                playText.innerText = "PAUSE TAPE";
                playIcon.className = "fas fa-pause mr-2";
            } else {
                audio.pause();
                tapeStatus.innerText = "● PAUSED";
                playText.innerText = "PLAY TAPE";
                playIcon.className = "fas fa-play mr-2";
            }
        }
    </script>
</body>
</html>
