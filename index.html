<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJN DSN | Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #05020a; color: white; 
            font-family: sans-serif; overflow-x: hidden; 
        }
        
        /* 1. شاشة الدخول الرئيسية */
        #enter-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #05020a; z-index: 99999 !important;
            cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out;
        }

        /* 2. الشمس الكبيرة فـ الخلفية */
        .sun-bg {
            position: fixed; bottom: -15%; left: 50%; transform: translateX(-50%);
            width: 900px; height: 900px;
            background: linear-gradient(to bottom, #ff007f, #ffcc00);
            border-radius: 50%; box-shadow: 0 0 200px #ff007f; z-index: -2;
        }

        /* 3. الشبكة المتحركة (Synthwave Grid) */
        .grid-floor {
            position: fixed; bottom: 0; width: 100%; height: 50%;
            background-image: linear-gradient(to right, #ff00ff 2px, transparent 2px), linear-gradient(to bottom, #ff00ff 2px, transparent 2px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg);
            z-index: -1; animation: moveGrid 2s linear infinite;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 50px; } }

        /* 4. تنسيق الوضوح للـ Thumbnail */
        .neon-glow-cyan { 
            text-shadow: 0 0 5px #00f0ff, 0 0 10px #00f0ff; color: #ffffff; 
            background: rgba(0, 0, 0, 0.6); padding: 2px 10px; 
            border: 1px solid rgba(0, 240, 255, 0.5); border-radius: 8px;
        }

        .cassette-container {
            background: rgba(10, 5, 20, 0.85); border: 2px solid #00f0ff;
            border-radius: 12px; padding: 20px; max-width: 450px;
            margin: 40px auto 20px auto; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        /* كروت عرض الصور والأثمنة */
        .item-card {
            background: rgba(15, 10, 25, 0.8); border: 1px solid rgba(255, 0, 127, 0.4);
            border-radius: 8px; overflow: hidden; transition: all 0.3s;
        }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 0 15px #ff007f; }
    </style>
</head>
