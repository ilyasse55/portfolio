<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJN DSN | Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #05020a; color: white; 
            font-family: sans-serif; overflow-x: hidden; 
        }
        
        /* 1. شاشة الدخول الرئيسية */
        #enter-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #05020a; z-index: 99999 !important;
            cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out;
        }

        /* 2. الشمس الكبيرة فـ الخلفية */
        .sun-bg {
            position: fixed; bottom: -15%; left: 50%; transform: translateX(-50%);
            width: 900px; height: 900px;
            background: linear-gradient(to bottom, #ff007f, #ffcc00);
            border-radius: 50%; box-shadow: 0 0 200px #ff007f; z-index: -2;
        }

        /* 3. الشبكة المتحركة (Synthwave Grid) */
        .grid-floor {
            position: fixed; bottom: 0; width: 100%; height: 50%;
            background-image: linear-gradient(to right, #ff00ff 2px, transparent 2px), linear-gradient(to bottom, #ff00ff 2px, transparent 2px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg);
            z-index: -1; animation: moveGrid 2s linear infinite;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 50px; } }

        /* 4. تنسيق الوضوح للـ Thumbnail */
        .neon-glow-cyan { 
            text-shadow: 0 0 5px #00f0ff, 0 0 10px #00f0ff; color: #ffffff; 
            background: rgba(0, 0, 0, 0.6); padding: 2px 10px; 
            border: 1px solid rgba(0, 240, 255, 0.5); border-radius: 8px;
        }

        .cassette-container {
            background: rgba(10, 5, 20, 0.85); border: 2px solid #00f0ff;
            border-radius: 12px; padding: 20px; max-width: 450px;
            margin: 40px auto 20px auto; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        /* كروت عرض الصور والأثمنة */
        .item-card {
            background: rgba(15, 10, 25, 0.8); border: 1px solid rgba(255, 0, 127, 0.4);
            border-radius: 8px; overflow: hidden; transition: all 0.3s;
        }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 0 15px #ff007f; }
    </style>
</head>
<body class="min-h-screen relative pb-24">

    <div id="enter-screen" onclick="initializeVault()">
        <span class="text-xs text-zinc-600 mb-2 tracking-widest font-mono">CORE_SYSTEM_ONLINE v867</span>
        <h2 class="text-xl md:text-2xl font-black text-cyan-400 tracking-widest font-retro select-none animate-pulse">
            [ CLICK TO ENTER THE VAULT ]
        </h2>
    </div>

    <div class="absolute top-4 right-4 z-50">
        <button onclick="openLogin()" class="px-4 py-2 bg-pink-600 hover:bg-pink-700 text-white font-bold rounded-lg shadow-lg font-mono text-xs tracking-wider transition">
            <i class="fas fa-lock mr-2"></i>ADMIN LOG IN
        </button>
    </div>

    <div class="sun-bg"></div>
    <div class="grid-floor"></div>

    <div class="relative z-10 text-center pt-20 px-4">
        <h1 class="text-4xl md:text-6xl font-black tracking-tight text-white mb-4">
            Do you need <span class="neon-glow-cyan">a thumbnail</span>
        </h1>
        <h2 class="text-3xl md:text-5xl font-black text-white mb-6">
            that boosts your CTR?
        </h2>
        
        <div class="cassette-container">
            <div class="text-left text-xs font-mono text-cyan-400 mb-4 flex justify-between">
                <span>SYSTEM_AUDIO: Venger.mp3</span>
                <span id="tape-status">● READY</span>
            </div>
            <button id="playBtn" class="w-full py-3 bg-cyan-400 hover:bg-pink-500 text-black hover:text-white font-bold uppercase rounded-md transition" onclick="toggleAudio()">
                <i id="playIcon" class="fas fa-play mr-2"></i> <span id="playText">INSERT TAPE / PLAY</span>
            </button>
            <audio id="bgAudio" src="Venger.mp3" loop></audio>
        </div>

        <div class="max-w-6xl mx-auto mt-16 px-4">
            <h3 class="text-xl font-bold font-mono tracking-widest text-pink-500 mb-8 text-left border-b border-pink-500/30 pb-2">
                <i class="fas fa-th-large mr-2"></i>AVAILABLE WORK & PRICING
            </h3>
            
            <div id="itemsGallery" class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
                <div class="item-card">
                    <div class="h-48 bg-zinc-800 flex items-center justify-center text-zinc-500 font-mono">Sample Thumbnail 1</div>
                    <div class="p-4 flex justify-between items-center bg-black/40">
                        <span class="font-bold text-white text-sm">Gaming Thumbnail</span>
                        <span class="text-cyan-400 font-mono font-bold">$15.00</span>
                    </div>
                </div>
                <div class="item-card">
                    <div class="h-48 bg-zinc-800 flex items-center justify-center text-zinc-500 font-mono">Sample Thumbnail 2</div>
                    <div class="p-4 flex justify-between items-center bg-black/40">
                        <span class="font-bold text-white text-sm">Vlog Cinematic</span>
                        <span class="text-cyan-400 font-mono font-bold">$20.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100000] hidden flex items-center justify-center p-4">
        <div class="bg-[#0f0a1c] border-2 solid border-pink-500 p-6 rounded-xl max-w-sm w-full font-mono text-sm">
            <div class="flex justify-between items-center mb-6">
                <span class="text-pink-500 font-bold"><i class="fas fa-terminal mr-2"></i>SECURE AUTH</span>
                <button onclick="closeLogin()" class="text-zinc-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">USER_ID</label>
                    <input id="adminUser" type="text" class="w-full bg-black/50 border border-zinc-700 p-2 rounded text-white focus:outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">PASSWORD_HASH</label>
                    <input id="adminPass" type="password" class="w-full bg-black/50 border border-zinc-700 p-2 rounded text-white focus:outline-none focus:border-cyan-400">
                </div>
                <button onclick="checkAdminAuth()" class="w-full py-2 bg-pink-600 hover:bg-pink-700 font-bold rounded text-white transition">EXECUTE LOGIN</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="fixed bottom-4 left-4 right-4 bg-[#0a0514]/95 border-2 border-green-500 rounded-xl p-4 z-50 hidden font-mono text-xs shadow-2xl">
        <div class="flex justify-between items-center border-b border-green-500/30 pb-2 mb-4">
            <span class="text-green-400 font-bold"><i class="fas fa-user-shield mr-2"></i>ADMIN PANEL ACTIVE</span>
            <button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="text-zinc-400 hover:text-red-500"><i class="fas fa-eye-slash"></i> HIDE</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-zinc-400 mb-1">Upload Thumbnail Image</label>
                <input id="uploadImg" type="file" accept="image/*" class="w-full bg-black/40 border border-zinc-700 p-1 rounded text-zinc-300">
            </div>
            <div>
                <label class="block text-zinc-400 mb-1">Thumbnail Title</label>
                <input id="itemTitle" type="text" placeholder="e.g., Concept Art" class="w-full bg-black/40 border border-zinc-700 p-1.5 rounded text-white focus:outline-none">
            </div>
            <div class="flex items-end gap-2">
                <div class="flex-1">
                    <label class="block text-zinc-400 mb-1">Price ($)</label>
                    <input id="itemPrice" type="text" placeholder="e.g., 25.00" class="w-full bg-black/40 border border-zinc-700 p-1.5 rounded text-white focus:outline-none">
                </div>
                <button onclick="addUploadedItem()" class="px-4 py-2 bg-green-600 hover:bg-green-700 font-bold rounded text-black transition">PUBLISH</button>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgAudio');
        const playBtn = document.getElementById('playBtn');
        const playText = document.getElementById('playText');
        const playIcon = document.getElementById('playIcon');
        const tapeStatus = document.getElementById('tape-status');

        // بيانات الدخول الافتراضية (تقدر تبدلها)
        const SYS_USER = "admin";
        const SYS_HASH = "1234";

        function initializeVault() {
            const screen = document.getElementById('enter-screen');
            screen.style.opacity = '0';
            setTimeout(() => { screen.style.display = 'none'; }, 800);

            // تشغيل الأغنية فوراً وبشكل صحيح عند الدخول للموقع
            audio.play().then(() => {
                tapeStatus.innerText = "● PLAYING";
                playText.innerText = "PAUSE TAPE";
                playIcon.className = "fas fa-pause mr-2";
            }).catch(err => {
                console.log("Audio waiting for explicit button click.");
            });
        }

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                tapeStatus.innerText = "● PLAYING";
                playText.innerText = "PAUSE TAPE";
                playIcon.className = "fas fa-pause mr-2";
            } else {
                audio.pause();
                tapeStatus.innerText = "● PAUSED";
                playText.innerText = "PLAY TAPE";
                playIcon.className = "fas fa-play mr-2";
            }
        }

        // دوال الـ Admin Login
        function openLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); }

        function checkAdminAuth() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;

            if (user === SYS_USER && pass === SYS_HASH) {
                confetti({ particleCount: 100, spread: 60, colors: ['#ff007f', '#00f0ff'] });
                closeLogin();
                document.getElementById('adminPanel').classList.remove('hidden');
            } else {
                alert("🚨 INTRUDER REJECTED: CRITICAL AUTHENTICATION FAILURE.");
            }
        }

        // دالة الـ Dynamic Upload للصور والأثمنة
        function addUploadedItem() {
            const title = document.getElementById('itemTitle').value;
            const price = document.getElementById('itemPrice').value;
            const fileInput = document.getElementById('uploadImg');
            
            if (!title || !price || !fileInput.files[0]) {
                alert("Please fill all fields and select an image!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const gallery = document.getElementById('itemsGallery');
                
                // إنشاء كرت صورة جديد وإضافته للـ Gallery ديريكت
                const newCard = document.createElement('div');
                newCard.className = "item-card";
                newCard.innerHTML = `
                    <div class="h-48 bg-cover bg-center" style="background-image: url('${e.target.result}')"></div>
                    <div class="p-4 flex justify-between items-center bg-black/40">
                        <span class="font-bold text-white text-sm">${title}</span>
                        <span class="text-cyan-400 font-mono font-bold">$${parseFloat(price).toFixed(2)}</span>
                    </div>
                `;
                gallery.prepend(newCard); // يظهر فـ الأول
                
                // مسح الحقول بعد النشر الناجح
                document.getElementById('itemTitle').value = '';
                document.getElementById('itemPrice').value = '';
                fileInput.value = '';
            };
            reader.readAsDataURL(fileInput.files[0]);
        }
    </script>
</body>
</html>
